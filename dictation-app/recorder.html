<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Recorder (hidden)</title>
</head>
<body>
<script>
// This window is never shown — it only runs the MediaRecorder + Whisper API call.

let mediaRecorder = null;
let audioChunks = [];
let stream = null;
let analyser = null;
let silenceTimer = null;
let silenceTimeout = 2500;
let language = "en";
let openaiApiKey = "";
let audioContext = null;
let discarding = false;   // when true, onstop skips transcription
let stopping = false;     // guard against double-stop

// ── Audio tones ────────────────────────────────────────────────────────────────
function playTone(frequency, duration = 100, volume = 0.4) {
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = frequency;
    osc.type = "sine";
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration / 1000);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration / 1000);
    osc.onended = () => ctx.close();
  } catch (_) {}
}

function playStartTone() {
  playTone(600, 80);
  setTimeout(() => playTone(900, 120), 90);
}

function playStopTone() {
  playTone(700, 80);
  setTimeout(() => playTone(440, 120), 90);
}
let anthropicApiKey = "";
let claudeCleanup = false;
let claudeModel = "claude-haiku-4-5-20251001";

async function loadConfig() {
  const cfg = await window.dictation.getConfig();
  openaiApiKey     = cfg.openaiApiKey ?? "";
  anthropicApiKey  = cfg.anthropicApiKey ?? "";
  claudeCleanup    = cfg.claudeCleanup ?? false;
  claudeModel      = cfg.claudeModel ?? "claude-haiku-4-5-20251001";
  language         = cfg.language ?? "en";
  silenceTimeout   = cfg.silenceTimeout ?? 2500;
}
loadConfig();

window.dictation.onStartRecording(async (opts = {}) => {
  // Reload config fresh every time so settings changes take effect without restart
  await loadConfig();
  language = opts.language ?? language;
  silenceTimeout = opts.silenceTimeout ?? silenceTimeout;
  discarding = false;
  stopping = false;
  console.log(`[Recorder] Starting — claudeCleanup=${claudeCleanup}, model=${claudeModel}, hasAnthropicKey=${!!anthropicApiKey}`);
  await startRecording();
});

window.dictation.onStopRecording(() => {
  discarding = false;
  stopRecording();
});

window.dictation.onPause(() => {
  if (mediaRecorder && mediaRecorder.state === "recording") {
    clearSilenceTimer();
    mediaRecorder.pause();
  }
});

window.dictation.onResume(() => {
  if (mediaRecorder && mediaRecorder.state === "paused") {
    mediaRecorder.resume();
    setupSilenceDetection();
  }
});

window.dictation.onDiscard(() => {
  discarding = true;
  stopRecording();
});

async function startRecording() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    window.dictation.transcriptReady({ text: "", error: "Microphone access denied: " + err.message });
    return;
  }

  playStartTone();
  audioChunks = [];

  // Report which mic is active
  const micLabel = stream.getAudioTracks()[0]?.label ?? "Unknown microphone";
  window.dictation.micInfo(micLabel);

  // Pick best supported codec
  const mimeType = ["audio/webm;codecs=opus", "audio/webm", "audio/ogg"].find(
    (m) => MediaRecorder.isTypeSupported(m)
  ) ?? "";

  mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };
  mediaRecorder.onstop = async () => {
    clearSilenceTimer();
    if (discarding) {
      stopStream();
      return; // throw away — no transcription
    }
    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || "audio/webm" });
    stopStream();
    await transcribe(blob);
  };

  mediaRecorder.start(100); // collect in 100 ms chunks
  setupSilenceDetection();
}

function stopRecording() {
  // Guard: if already stopping or stopped, do nothing.
  // onstop will handle transcription once — no double-fire.
  if (stopping) return;
  if (!mediaRecorder || mediaRecorder.state === "inactive") return;
  stopping = true;
  if (!discarding) playStopTone();
  clearSilenceTimer();
  mediaRecorder.stop();
}

function stopStream() {
  if (stream) {
    stream.getTracks().forEach((t) => t.stop());
    stream = null;
  }
  if (audioContext) {
    audioContext.close();
    audioContext = null;
  }
}

// ── Silence detection ──────────────────────────────────────────────────────────
function setupSilenceDetection() {
  if (silenceTimeout === 0) return; // disabled
  try {
    if (!audioContext) {
      audioContext = new AudioContext();
      const source = audioContext.createMediaStreamSource(stream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 512;
      source.connect(analyser);
    }
    checkSilence();
  } catch (_) {}
}

function checkSilence() {
  if (!analyser || !mediaRecorder || mediaRecorder.state !== "recording") return;

  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(data);

  let sumSq = 0;
  for (const v of data) {
    const norm = (v - 128) / 128;
    sumSq += norm * norm;
  }
  const rms = Math.sqrt(sumSq / data.length);

  if (rms < 0.015) {
    if (!silenceTimer) {
      silenceTimer = setTimeout(() => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          // Signal main to update UI, then stop locally.
          // Main must NOT send stop-recording back — recorder handles it.
          window.dictation.autoStopped();
          discarding = false;
          stopRecording();
        }
      }, silenceTimeout);
    }
  } else {
    clearSilenceTimer();
  }

  requestAnimationFrame(checkSilence);
}

function clearSilenceTimer() {
  if (silenceTimer) {
    clearTimeout(silenceTimer);
    silenceTimer = null;
  }
}

// ── Whisper transcription ──────────────────────────────────────────────────────
async function transcribe(audioBlob) {
  if (!openaiApiKey) {
    window.dictation.transcriptReady({ text: "", error: "No OpenAI API key. Open Settings." });
    return;
  }

  const ext = audioBlob.type.includes("ogg") ? "ogg" : "webm";
  const file = new File([audioBlob], `recording.${ext}`, { type: audioBlob.type });

  const form = new FormData();
  form.append("file", file);
  form.append("model", "whisper-1");
  form.append("language", language);
  form.append("response_format", "text");

  try {
    const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
      method: "POST",
      headers: { Authorization: `Bearer ${openaiApiKey}` },
      body: form,
    });

    if (!res.ok) {
      const msg = await res.text();
      window.dictation.transcriptReady({ text: "", error: `Whisper API ${res.status}: ${msg}` });
      return;
    }

    const rawText = (await res.text()).trim();
    const finalText = await maybeCleanWithClaude(rawText);
    window.dictation.transcriptReady({ text: finalText, error: null });
  } catch (err) {
    window.dictation.transcriptReady({ text: "", error: err.message });
  }
}

// ── Claude cleanup ─────────────────────────────────────────────────────────────
const CLAUDE_SYSTEM = `You are a dictation editor. The user spoke into a microphone and the audio was transcribed by Whisper. Clean up the raw transcript by:
- Removing filler words (um, uh, like, so, you know, I mean, right, basically)
- Fixing punctuation, capitalization, and sentence breaks
- Joining run-on sentences naturally
- Preserving the original meaning and all content exactly — do not add, remove, or reinterpret anything
- IMPORTANT: preserve the exact phrases "new line", "newline", "next line", and "new paragraph" exactly as spoken — they are keyboard commands, not filler words

Reply with only the cleaned text. No preamble, no explanation.`;

async function maybeCleanWithClaude(rawText) {
  if (!claudeCleanup) { console.log("[Claude] Skipped — disabled in settings"); return rawText; }
  if (!anthropicApiKey) { console.warn("[Claude] Skipped — no Anthropic API key"); return rawText; }
  if (!rawText) return rawText;

  console.log(`[Claude] Calling ${claudeModel} to clean: "${rawText}"`);
  window.dictation.cleaningStarted();

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "x-api-key": anthropicApiKey,
        "anthropic-version": "2023-06-01",
        "content-type": "application/json",
      },
      body: JSON.stringify({
        model: claudeModel,
        max_tokens: 1024,
        system: CLAUDE_SYSTEM,
        messages: [{ role: "user", content: rawText }],
      }),
    });

    if (!res.ok) {
      console.warn("[Dictation] Claude API error", res.status, "— using raw transcript");
      return rawText;
    }

    const data = await res.json();
    const cleaned = data?.content?.[0]?.text?.trim();
    console.log(`[Claude] Result: "${cleaned}"`);
    return cleaned || rawText;
  } catch (err) {
    console.warn("[Claude] Fetch failed:", err.message, "— using raw transcript");
    return rawText;
  }
}
</script>
</body>
</html>
