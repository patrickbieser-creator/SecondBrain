<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dictation Indicator</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, "Segoe UI", sans-serif;
      /* Allow dragging the card */
      -webkit-app-region: drag;
    }

    /* Buttons and interactive elements must opt out of drag */
    button { -webkit-app-region: no-drag; }

    #card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px 16px 10px;
      border-radius: 16px;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      box-shadow: 0 6px 32px rgba(0,0,0,0.40), 0 0 0 1px rgba(255,255,255,0.10);
      transition: background 0.2s;
    }

    /* ── State backgrounds ── */
    body.recording  #card { background: rgba(24, 24, 28, 0.92); }
    body.paused     #card { background: rgba(24, 24, 28, 0.92); }
    body.processing #card { background: rgba(24, 24, 28, 0.92); }
    body.cleaning   #card { background: rgba(109, 40, 217, 0.88); }
    body.success    #card { background: rgba(22, 163, 74,  0.88); }
    body.error      #card { background: rgba(185, 28, 28,  0.88); }

    /* ── Status row ── */
    #status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Icon ── */
    #icon {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      position: relative;
    }
    #icon svg { width: 18px; height: 18px; fill: currentColor; }

    body.recording #icon svg  { color: #f87171; }
    body.recording #icon::before {
      content: '';
      position: absolute;
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 2px solid rgba(248,113,113,0.55);
      animation: pulse-ring 1.4s ease-out infinite;
    }
    body.paused #icon svg { color: #fbbf24; }

    @keyframes pulse-ring {
      0%   { transform: scale(0.55); opacity: 1; }
      100% { transform: scale(1.6);  opacity: 0; }
    }

    /* ── Waveform ── */
    #wave {
      display: none;
      align-items: center;
      gap: 3px;
      height: 20px;
      flex-shrink: 0;
    }
    body.recording #wave { display: flex; }

    #wave span {
      display: block;
      width: 3px;
      border-radius: 99px;
      background: rgba(248,113,113,0.85);
      animation: wave-bar 0.9s ease-in-out infinite alternate;
    }
    #wave span:nth-child(1) { animation-delay: 0s;    animation-duration: 0.8s; }
    #wave span:nth-child(2) { animation-delay: 0.15s; animation-duration: 1.0s; }
    #wave span:nth-child(3) { animation-delay: 0.3s;  animation-duration: 0.7s; }
    #wave span:nth-child(4) { animation-delay: 0.45s; animation-duration: 1.1s; }
    #wave span:nth-child(5) { animation-delay: 0.1s;  animation-duration: 0.9s; }

    @keyframes wave-bar {
      from { height: 4px;  opacity: 0.5; }
      to   { height: 18px; opacity: 1;   }
    }

    /* ── Spinner ── */
    #spinner {
      display: none;
      flex-shrink: 0;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    body.processing #spinner,
    body.cleaning   #spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Text group ── */
    #text-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }

    #label {
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #mic-label {
      font-size: 10px;
      color: rgba(255,255,255,0.42);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: none;
    }
    body.recording #mic-label,
    body.paused    #mic-label { display: block; }

    /* ── Button row ── */
    #btn-row {
      display: none;
      gap: 6px;
    }
    body.recording #btn-row,
    body.paused    #btn-row { display: flex; }

    #btn-row button {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 5px 0;
      border: none;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      color: #fff;
      white-space: nowrap;
    }
    #btn-row button:hover  { opacity: 0.82; }
    #btn-row button:active { transform: scale(0.96); }

    #btn-row button svg {
      width: 13px; height: 13px;
      fill: currentColor;
      flex-shrink: 0;
    }

    #btn-pause  { background: rgba(255,255,255,0.12); }
    #btn-resume { background: rgba(255,255,255,0.12); display: none; }
    #btn-done   { background: rgba(74, 222, 128, 0.28); }
    #btn-cancel { background: rgba(248, 113, 113, 0.22); }

    body.paused #btn-pause  { display: none; }
    body.paused #btn-resume { display: flex; }
  </style>
</head>
<body class="recording">
  <div id="card">
    <!-- Status row -->
    <div id="status-row">
      <div id="icon">
        <svg id="svg-mic" viewBox="0 0 24 24">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.31 6-6.72h-1.7z"/>
        </svg>
        <svg id="svg-pause-icon" viewBox="0 0 24 24" style="display:none">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
        <svg id="svg-check" viewBox="0 0 24 24" style="display:none">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
        <svg id="svg-x" viewBox="0 0 24 24" style="display:none">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </div>

      <div id="wave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <div id="spinner"></div>

      <div id="text-group">
        <span id="label">Listening…</span>
        <span id="mic-label"></span>
      </div>
    </div>

    <!-- Button row (recording + paused states only) -->
    <div id="btn-row">
      <button id="btn-pause" title="Pause recording">
        <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        Pause
      </button>
      <button id="btn-resume" title="Resume recording">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        Resume
      </button>
      <button id="btn-done" title="Stop and transcribe">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        Done
      </button>
      <button id="btn-cancel" title="Discard recording">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        Cancel
      </button>
    </div>
  </div>

  <script>
    const body    = document.body;
    const label   = document.getElementById("label");
    const micLabel = document.getElementById("mic-label");
    const svgMic  = document.getElementById("svg-mic");
    const svgPauseIcon = document.getElementById("svg-pause-icon");
    const svgCheck = document.getElementById("svg-check");
    const svgX    = document.getElementById("svg-x");

    // ── Button wiring ──────────────────────────────────────────────────────────
    document.getElementById("btn-pause").addEventListener("click",  () => window.controls.pause());
    document.getElementById("btn-resume").addEventListener("click", () => window.controls.resume());
    document.getElementById("btn-done").addEventListener("click",   () => window.controls.stop());
    document.getElementById("btn-cancel").addEventListener("click", () => window.controls.discard());

    // ── State machine ──────────────────────────────────────────────────────────
    window.setState = function(state, detail) {
      body.className = state;

      // Reset icons
      svgMic.style.display = "block";
      svgPauseIcon.style.display = "none";
      svgCheck.style.display = "none";
      svgX.style.display = "none";

      if (state === "recording") {
        label.textContent = "Listening\u2026";
      } else if (state === "paused") {
        svgMic.style.display = "none";
        svgPauseIcon.style.display = "block";
        label.textContent = "Paused";
      } else if (state === "processing") {
        svgMic.style.display = "none";
        label.textContent = "Transcribing\u2026";
      } else if (state === "cleaning") {
        svgMic.style.display = "none";
        label.textContent = "Cleaning up\u2026";
      } else if (state === "success") {
        svgMic.style.display = "none";
        svgCheck.style.display = "block";
        label.textContent = detail ? truncate(detail, 26) : "Pasted!";
      } else if (state === "error") {
        svgMic.style.display = "none";
        svgX.style.display = "block";
        label.textContent = detail ? truncate(detail, 26) : "Error";
      }
    };

    window.setMicLabel = function(name) {
      micLabel.textContent = name;
    };

    function truncate(str, max) {
      return str.length > max ? str.slice(0, max) + "\u2026" : str;
    }
  </script>
</body>
</html>
